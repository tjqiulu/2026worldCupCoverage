<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF6B7A"/>
      <stop offset="100%" stop-color="#E63946"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80" ry="80"/>
  <!-- Soccer ball -->
  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="140" fill="white" stroke="#1D3557" stroke-width="6"/>
    <!-- Pentagon in center -->
    <polygon points="0,-60 57,-18 35,42 -35,42 -57,-18"
             fill="#1D3557" stroke="#1D3557" stroke-width="4"/>
    <!-- Lines from pentagon to edges -->
    <line x1="0" y1="-60" x2="0" y2="-110" stroke="#1D3557" stroke-width="5"/>
    <line x1="57" y1="-18" x2="100" y2="-60" stroke="#1D3557" stroke-width="5"/>
    <line x1="35" y1="42" x2="80" y2="80" stroke="#1D3557" stroke-width="5"/>
    <line x1="-35" y1="42" x2="-80" y2="80" stroke="#1D3557" stroke-width="5"/>
    <line x1="-57" y1="-18" x2="-100" y2="-60" stroke="#1D3557" stroke-width="5"/>
  </g>
  <!-- Title text at top -->
  <text x="256" y="60" font-family="system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="800" text-anchor="middle" fill="white"
        letter-spacing="2">FIFA</text>
  <text x="256" y="465" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" text-anchor="middle" fill="white"
        letter-spacing="1">WORLD CUP</text>
  <text x="256" y="495" font-family="system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="600" text-anchor="middle" fill="white"
        letter-spacing="3">2026</text>
</svg>
