<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 世界杯 2026 World Cup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="title">
            <span class="emoji">🏆</span>
            <h1>2026 世界杯</h1>
            <span class="subtitle">FIFA World Cup</span>
        </div>
        <div class="actions">
            <button id="today-btn" title="跳到今天">📅 今天</button>
            <button id="refresh-btn" title="重新拉取数据">🔄 刷新</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab" data-tab="matches">赛程 Matches</button>
        <button class="tab active" data-tab="bracket">对阵 Bracket</button>
    </nav>

    <main>
        <div id="matches-view" class="view">
            <p class="loading">加载中 Loading...</p>
        </div>
        <div id="bracket-view" class="view active">
            <p class="loading">加载中 Loading...</p>
        </div>
    </main>

    <footer>
        <small>数据源: <a href="https://github.com/baires/fifa-cal-2026" target="_blank">baires/fifa-cal-2026</a> · 时间: 北京时间 (UTC+8) · 本地缓存: <span id="cache-info">未知</span></small>
    </footer>

    <!-- Match detail modal (Plan 009) -->
    <div id="match-modal" class="match-modal" hidden>
        <div class="match-modal-backdrop"></div>
        <div class="match-modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-stage">
            <button class="match-modal-close" aria-label="关闭">×</button>
            <div class="match-modal-content">
                <div class="match-modal-stage" id="modal-stage"></div>
                <div class="match-modal-date" id="modal-date"></div>
                <div class="match-modal-teams">
                    <div class="match-modal-team" id="modal-home"></div>
                    <div class="match-modal-vs">VS</div>
                    <div class="match-modal-team" id="modal-away"></div>
                </div>
                <div class="match-modal-venue" id="modal-venue"></div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
